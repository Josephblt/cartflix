<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cartflix</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="images/icons/cartflix-192.png">
    <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Cartflix">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#245b44">
    <link rel="stylesheet" href="styles/app.css">
    <script src="app.js" type="module"></script>
  </head>
  <body>
    <main class="initial-screen" aria-labelledby="app-title">
      <section class="screen-group brand-group" data-opening-view>
        <img class="brand-mark" src="images/c_logo.png" alt="" width="180" height="180">
        <h1 id="app-title">Cartflix</h1>
        <p class="opening-quip" data-opening-quip>The first rule of Cart Club is: You do not talk about Cart Club.</p>
      </section>
      <section class="screen-group login-group" data-login-view hidden>
        <form class="auth-form" data-auth-form>
          <input class="auth-input" data-auth-username name="username" autocomplete="username" placeholder="Username" required>
          <input class="auth-input" data-auth-password name="password" autocomplete="current-password" placeholder="Password" type="password" required>
          <button class="auth-submit" data-auth-submit type="submit">Login</button>
          <p class="auth-message" data-auth-message aria-live="polite" hidden></p>
        </form>
      </section>
    </main>
  </body>
</html>
