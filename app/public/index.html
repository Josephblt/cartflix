<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cartflix</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/cartflix-192.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Cartflix">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#245b44">
    <link rel="stylesheet" href="app.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="initial-screen" aria-labelledby="app-title">
      <div class="brand-group">
        <img class="brand-mark" src="brand/cartflix-c-mark.png" alt="" width="180" height="180">
        <h1 id="app-title">Cartflix</h1>
        <p class="opening-quip" data-opening-quip>The first rule of Cart Club is: You do not talk about Cart Club.</p>
        <form class="auth-form" data-auth-form hidden>
          <input class="auth-input" data-auth-username name="username" autocomplete="username" placeholder="Username" required>
          <input class="auth-input" data-auth-display-name name="displayName" autocomplete="name" placeholder="Display name" hidden>
          <input class="auth-input" data-auth-password name="password" autocomplete="current-password" placeholder="Password" type="password" required>
          <button class="auth-submit" data-auth-submit type="submit">Sign in</button>
          <p class="auth-message" data-auth-message aria-live="polite"></p>
        </form>
        <div class="auth-session" data-auth-session hidden>
          <p class="auth-message">Signed in as <span data-auth-user></span></p>
          <button class="auth-submit" data-auth-logout type="button">Sign out</button>
        </div>
      </div>
    </main>
  </body>
</html>
