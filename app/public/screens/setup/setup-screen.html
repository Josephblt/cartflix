<section class="screen-group setup-group" data-setup-view hidden>
  <h1 class="setup-title">Setup</h1>
  <form class="setup-form" data-setup-form>
    <input class="setup-input" data-setup-display-name name="displayName" autocomplete="name" placeholder="Display name">
    <input class="setup-input" data-setup-username name="username" autocomplete="username" placeholder="Username" required>
    <input class="setup-input" data-setup-password name="password" autocomplete="new-password" placeholder="Password" type="password" required minlength="6">
    <button class="setup-submit" data-setup-submit type="submit">Create owner</button>
  </form>
  <p class="setup-message" data-setup-message aria-live="polite" hidden></p>
</section>
